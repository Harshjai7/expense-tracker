name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy app icons
        run: |
          ICON_BASE=android/app/src/main/res
          for folder in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp android-icons/$folder/ic_launcher.png $ICON_BASE/$folder/ic_launcher.png
            cp android-icons/$folder/ic_launcher_round.png $ICON_BASE/$folder/ic_launcher_round.png
          done
          echo "Icons copied!"

      - name: Sync web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
